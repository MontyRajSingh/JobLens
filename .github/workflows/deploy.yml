name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run import and syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check scrapers import cleanly
        run: |
          python -c "
          from scrapers import LinkedInScraper, IndeedScraper, GlassdoorScraper
          print('Scrapers OK')
          "

      - name: Check pipeline imports cleanly
        run: |
          python -c "
          from pipeline.data_cleaner import DataCleaner
          from pipeline.preprocessing import FeatureEngineer
          from pipeline.model import SalaryPredictor
          from pipeline.predict import predict_salary
          print('Pipeline OK')
          "

      - name: Check API imports cleanly
        run: |
          python -c "
          from api.main import app
          print('API OK')
          "

      - name: Check frontend builds
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app

