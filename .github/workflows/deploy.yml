name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run import and syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check scrapers import cleanly
        run: |
          python -c "
          from scrapers import LinkedInScraper, IndeedScraper, GlassdoorScraper
          print('Scrapers OK')
          "

      - name: Check pipeline imports cleanly
        run: |
          python -c "
          from pipeline.data_cleaner import DataCleaner
          from pipeline.preprocessing import FeatureEngineer
          from pipeline.model import SalaryPredictor
          from pipeline.predict import predict_salary
          print('Pipeline OK')
          "

      - name: Check API imports cleanly
        run: |
          python -c "
          from api.main import app
          print('API OK')
          "

      - name: Check frontend builds
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app

  deploy-api:
    name: Deploy API to Railway
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway deployment
        run: |
          curl -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy to Vercel
        working-directory: frontend
        run: |
          npm install -g vercel
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
