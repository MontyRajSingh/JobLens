name: Daily Job Scraper

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    # Grant permission for the action to push changes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install Google Chrome (for Selenium)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run JobLens Scraper
        env:
          GLASSDOOR_EMAIL: ${{ secrets.GLASSDOOR_EMAIL }}
          GLASSDOOR_PASSWORD: ${{ secrets.GLASSDOOR_PASSWORD }}
          # PostgreSQL connection for direct database inserts
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Adjust the max-jobs if you want it to scrape more or less per day
          python main.py --max-jobs 30
          
      - name: Commit and Push new data
        run: |
          # Configure git with a bot identity
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the newly created CSV/JSON files in the output directory
          git add output/
          
          # Check if there are actually any changes to commit
          if git diff-index --quiet HEAD; then
            echo "No new data to commit. Exiting."
          else
            git commit -m "🤖 Auto-scrape: Added daily job market data [skip ci]"
            git push
          fi
