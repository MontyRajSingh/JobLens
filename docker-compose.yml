version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount output and models so local changes persist
      - ./output:/app/output
      - ./pipeline/models:/app/pipeline/models
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/jobs.db
      - MODEL_DIR=/app/pipeline/models
      - DATA_DIR=/app/output
      - ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
